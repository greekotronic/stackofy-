<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Stackofy | Evidence-Based Supplement Research</title>
  <meta name="description" content="Independent research on longevity supplements, dosing protocols, and what actually works. No pharma ties. No fluff." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
  <link rel="canonical" href="https://stackofy.com/articles.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="/header.js"></script>
  <script src="/articles-loader.js"></script>
  <style>
    :root {
      --green-dark: #1B4332; --green-mid: #2D6A4F; --green-light: #95D5B2;
      --gold: #D4A853; --gold-light: #FDF3E0; --bg: #FAF8F4; --surface: #ffffff;
      --text: #1A1A1A; --text-muted: #666666; --border: #E0DDD8;
      --gradient: linear-gradient(135deg, #1B4332 0%, #2D6A4F 55%, #7A5C10 100%);
      --radius: 12px; --radius-sm: 8px;
    }
    [data-theme="dark"] { --bg: #0F1A14; --surface: #1A2B20; --text: #F0EDE8; --text-muted: #9DB8AA; --border: #2A3D30; --gold-light: #2A220D; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: background 0.3s, color 0.3s; }
    a { text-decoration: none; color: inherit; }

    /* HERO */
    .articles-hero { position: relative; height: 280px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .hero-bg { position: absolute; inset: 0; background: var(--gradient); }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
    .hero-overlay { position: absolute; inset: 0; background: rgba(27,67,50,0.6); }
    .hero-text { position: relative; z-index: 2; text-align: center; padding: 2rem; }
    .hero-text h1 { color: #FAF8F4; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero-text p { color: var(--green-light); font-size: 15px; margin-bottom: 1.5rem; }
    .hero-search { display: flex; gap: 8px; max-width: 480px; margin: 0 auto; }
    .hero-search input { flex: 1; padding: 10px 16px; border-radius: var(--radius-sm); border: none; font-size: 14px; background: #FAF8F4; color: #1A1A1A !important; }
    .hero-search input:focus { outline: none; }
    .hero-search button { padding: 10px 20px; background: var(--gold); color: #1A1A1A; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }

    .main { max-width: 1040px; margin: 0 auto; padding: 2.5rem 2rem; }

    /* PROTOCOL SECTION */
    .protocol-section { background: linear-gradient(135deg, rgba(27,67,50,0.05), rgba(212,168,83,0.05)); border-radius: var(--radius); border: 1.5px solid var(--gold); padding: 2rem; margin-bottom: 3rem; }
    .protocol-section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .protocol-star { font-size: 18px; }
    .protocol-section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); }
    .protocol-section-title { font-size: 18px; font-weight: 700; color: var(--text); margin-left: auto; }
    .protocol-grid-page { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }

    /* PROTOCOL CARD - articles page version */
    .protocol-card-page { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--gold); overflow: hidden; display: flex; transition: transform 0.2s, box-shadow 0.2s; }
    .protocol-card-page:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(212,168,83,0.2); }
    .protocol-card-img { width: 180px; flex-shrink: 0; overflow: hidden; position: relative; }
    .protocol-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .protocol-badge { position: absolute; top: 8px; left: 8px; background: var(--gold); color: #1A1A1A; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .protocol-card-body { padding: 1.25rem; display: flex; flex-direction: column; justify-content: center; }
    .protocol-card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; background: var(--green-dark); color: #FAF8F4; border: 0.5px solid var(--gold); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 0.5rem; }
    .protocol-card-body h3 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; line-height: 1.4; }
    .protocol-card-body p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .protocol-card-meta { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 0.6rem; }

    /* CONTENT TYPE TABS */
    .type-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .type-tab { padding: 10px 18px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: none; background: none; border-bottom: 2.5px solid transparent; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px; }
    .type-tab:hover { color: var(--text); }
    .type-tab.active { color: var(--green-dark); border-bottom-color: var(--gold); }
    [data-theme="dark"] .type-tab.active { color: var(--green-light); }
    .type-tab .tab-count { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

    /* SORT TOGGLE */
    .sort-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
    .sort-toggle select { font-size: 13px; color: var(--text); background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; }
    .sort-toggle select:focus { outline: none; border-color: var(--green-dark); }

    .section-hidden-by-tab { display: none !important; }

    /* FILTER BAR */
    .filter-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .filter-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all 0.2s; }
    .pill:hover { border-color: var(--green-dark); color: var(--green-dark); }
    .pill.active { background: var(--green-dark); color: #FAF8F4; border-color: var(--green-dark); }
    .articles-count { font-size: 13px; color: var(--text-muted); }
    .articles-count span { font-weight: 700; color: var(--text); }
    .section-divider { height: 1px; background: var(--border); margin: 0 0 2rem; }
    .section-label-row { margin-bottom: 1.25rem; }
    .section-label-row .label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.25rem; }
    .section-label-row .title { font-size: 18px; font-weight: 700; color: var(--text); }

    /* ARTICLE CARDS */
    .articles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2.5rem; }
    .article-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .article-card:hover { border-color: var(--green-dark); transform: translateY(-2px); }
    .card-img { height: 140px; overflow: hidden; position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 1rem; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .article-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; background: #EAF5F0; color: var(--green-dark); padding: 3px 8px; border-radius: 4px; display: inline-block; }
    .read-time { font-size: 11px; color: var(--text-muted); }
    .article-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; line-height: 1.4; }
    .article-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .article-card.hidden { display: none; }

    /* RECENTLY ADDED */
    .recent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 2.5rem; }
    .recent-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .recent-card:hover { border-color: var(--green-dark); transform: translateY(-2px); }
    .recent-img { height: 90px; overflow: hidden; }
    .recent-img img { width: 100%; height: 100%; object-fit: cover; }
    .recent-body { padding: 0.875rem; }
    .recent-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .recent-card h4 { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }

    @media (max-width: 900px) {
      .articles-grid { grid-template-columns: 1fr 1fr !important; }
      .recent-grid { grid-template-columns: 1fr 1fr !important; }
      .protocol-grid-page { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 600px) {
      .articles-hero { height: 220px !important; }
      .hero-text h1 { font-size: 1.4rem !important; }
      .hero-search { flex-direction: column !important; }
      .hero-search input, .hero-search button { width: 100% !important; }
      .main { padding: 1.25rem 1rem !important; }
      .filter-bar { flex-direction: column !important; align-items: flex-start !important; }
      .articles-grid { grid-template-columns: 1fr !important; }
      .recent-grid { grid-template-columns: 1fr 1fr !important; }
      .protocol-card-page { flex-direction: column !important; }
      .protocol-card-img { width: 100% !important; height: 160px !important; }
    }
  </style>
</head>
<body>
<main>
  <div class="articles-hero">
    <div class="hero-bg">
      <img src="/images/scientist-desk-research-papers.jpg" alt="Research desk" onerror="this.style.display='none'" />
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <h1>The Research Library</h1>
      <p>Evidence-based. Independent. No pharma ties. No fluff.</p>
      <div class="hero-search">
        <input type="text" id="search-input" placeholder="Search supplements, protocols, ingredients..." oninput="filterArticles()" />
        <button>Search</button>
      </div>
    </div>
  </div>

  <div class="main">

    <!-- CONTENT TYPE TABS -->
    <div class="type-tabs" id="type-tabs">
      <button class="type-tab active" data-type="all" onclick="filterByType('all', this)">All Content</button>
      <button class="type-tab" data-type="supplements" onclick="filterByType('supplements', this)">Supplement Guides</button>
      <button class="type-tab" data-type="editorial" onclick="filterByType('editorial', this)">Editorial</button>
      <button class="type-tab" data-type="protocols" onclick="filterByType('protocols', this)">Protocols</button>
      <button class="type-tab" data-type="books" onclick="filterByType('books', this)">Books</button>
    </div>

    <!-- SUPPLEMENT GUIDES SECTION -->
    <div class="section-label-row">
      <div class="label">All Guides</div>
      <div class="title">Supplement Research Library</div>
    </div>

    <div class="filter-bar">
      <div class="filter-pills">
        <span class="pill active" onclick="filterBy('all', this)">All</span>
        <span class="pill" onclick="filterBy('longevity', this)">Longevity</span>
        <span class="pill" onclick="filterBy('immune', this)">Immune</span>
        <span class="pill" onclick="filterBy('brain', this)">Brain</span>
        <span class="pill" onclick="filterBy('sleep', this)">Sleep</span>
        <span class="pill" onclick="filterBy('performance', this)">Performance</span>
        <span class="pill" onclick="filterBy('energy', this)">Energy</span>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="sort-toggle">
          <label for="sort-select">Sort:</label>
          <select id="sort-select" onchange="applySortOrder()">
            <option value="newest">Newest</option>
            <option value="az">A-Z</option>
          </select>
        </div>
        <div class="articles-count"><span id="article-count">0</span> Articles</div>
      </div>
    </div>

    <div id="articles-grid" class="articles-grid"></div>

    <div class="section-divider"></div>

    <!-- PROTOCOLS SECTION - gold border, separate -->
    <div class="protocol-section" id="protocol-section">
      <div class="protocol-section-header">
        <span class="protocol-star">★</span>
        <span class="protocol-section-label">Protocols</span>
      </div>
      <div id="articles-protocols" class="protocol-grid-page"></div>
    </div>

    <!-- EDITORIAL SECTION -->
    <div class="protocol-section" id="editorial-section">
      <div class="protocol-section-header">
        <span class="protocol-star">★</span>
        <span class="protocol-section-label">Editorial</span>
      </div>
      <div id="articles-editorial" class="protocol-grid-page"></div>
    </div>

    <!-- BOOKS SECTION -->
    <div class="protocol-section" id="books-section">
      <div class="protocol-section-header">
        <span class="protocol-star">★</span>
        <span class="protocol-section-label">Books</span>
      </div>
      <div id="articles-books" class="protocol-grid-page"></div>
    </div>

    <div style="margin-bottom: 1rem;">
      <div style="font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem;">Recently Added</div>
    </div>
    <div class="recent-grid" id="recently-added-grid"></div>

  </div>

  <script>
    function filterByType(type, el) {
      document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');

      const supplementSection = document.querySelector('.section-label-row').closest('.main') ? null : null;
      const allGuidesLabelRow = document.querySelectorAll('.section-label-row')[0];
      const filterBarEl = document.querySelector('.filter-bar');
      const gridEl = document.getElementById('articles-grid');
      const protocolEl = document.getElementById('protocol-section');
      const editorialEl = document.getElementById('editorial-section');
      const booksEl = document.getElementById('books-section');

      const showSupplements = (type === 'all' || type === 'supplements');
      const showProtocols = (type === 'all' || type === 'protocols');
      const showEditorial = (type === 'all' || type === 'editorial');
      const showBooks = (type === 'all' || type === 'books');

      [allGuidesLabelRow, filterBarEl, gridEl].forEach(el => {
        if (el) el.classList.toggle('section-hidden-by-tab', !showSupplements);
      });
      if (protocolEl) protocolEl.classList.toggle('section-hidden-by-tab', !showProtocols);
      if (editorialEl) editorialEl.classList.toggle('section-hidden-by-tab', !showEditorial);
      if (booksEl) booksEl.classList.toggle('section-hidden-by-tab', !showBooks);

      // Reflect in URL without reloading, so the view is shareable/bookmarkable
      const url = new URL(window.location);
      if (type === 'all') url.searchParams.delete('type');
      else url.searchParams.set('type', type);
      window.history.replaceState({}, '', url);
    }

    function applySortOrder() {
      const sortValue = document.getElementById('sort-select').value;
      const grid = document.getElementById('articles-grid');
      if (!grid) return;

      if (!grid.dataset.originalOrderCaptured) {
        grid.__originalOrder = Array.from(grid.querySelectorAll('.article-card'));
        grid.dataset.originalOrderCaptured = 'true';
      }
      const cards = grid.__originalOrder || Array.from(grid.querySelectorAll('.article-card'));

      if (sortValue === 'az') {
        const sorted = [...cards].sort((a, b) => {
          const titleA = (a.getAttribute('data-title') || '').toLowerCase();
          const titleB = (b.getAttribute('data-title') || '').toLowerCase();
          return titleA.localeCompare(titleB);
        });
        sorted.forEach(c => grid.appendChild(c));
      } else {
        // Newest: restore original (chronological) document order
        cards.forEach(c => grid.appendChild(c));
      }
    }

    function filterBy(tag, el) {
      // Clear search when filter pill clicked
      document.getElementById('search-input').value = '';
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');

      // Filter supplement guides
      const cards = document.querySelectorAll('#articles-grid .article-card');
      let count = 0;
      cards.forEach(c => {
        const tags = c.getAttribute('data-tags') || '';
        if (tag === 'all' || tags.includes(tag)) { c.classList.remove('hidden'); count++; }
        else { c.classList.add('hidden'); }
      });
      document.getElementById('article-count').textContent = count;

      // Show all protocols/editorial/books when filter pill clicked
      document.querySelectorAll('#articles-protocols .protocol-card-page, #articles-editorial .protocol-card-page, #articles-books .protocol-card-page').forEach(c => {
        c.style.display = '';
      });
      ['protocol-section', 'editorial-section', 'books-section'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = '';
      });
    }

    function filterArticles() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();

      // Reset filter pills to All
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      document.querySelector('.pill[onclick*="all"]').classList.add('active');

      // Filter supplement guides
      const grid = document.getElementById('articles-grid');
      if (grid && !grid.dataset.originalOrderCaptured) {
        grid.__originalOrder = Array.from(grid.querySelectorAll('.article-card'));
        grid.dataset.originalOrderCaptured = 'true';
      }
      const cards = grid && grid.__originalOrder ? grid.__originalOrder : Array.from(document.querySelectorAll('#articles-grid .article-card'));
      let count = 0;
      cards.forEach(c => {
        const title = (c.getAttribute('data-title') || '').toLowerCase();
        const desc = c.querySelector('p') ? c.querySelector('p').textContent.toLowerCase() : '';
        const matches = !query || title.includes(query) || desc.includes(query);
        if (matches) { c.classList.remove('hidden'); count++; }
        else { c.classList.add('hidden'); }
      });
      document.getElementById('article-count').textContent = count;

      // Rank visible cards: title matches first, then description-only matches, original order preserved within each group
      if (query && grid) {
        const titleMatches = [];
        const descOnlyMatches = [];
        const rest = [];
        cards.forEach(c => {
          const title = (c.getAttribute('data-title') || '').toLowerCase();
          if (c.classList.contains('hidden')) { rest.push(c); return; }
          if (title.includes(query)) titleMatches.push(c);
          else descOnlyMatches.push(c);
        });
        titleMatches.concat(descOnlyMatches, rest).forEach(c => grid.appendChild(c));
      } else if (grid) {
        // No active query: restore original document order
        cards.forEach(c => grid.appendChild(c));
      }

      // Filter protocols, editorial, and books sections - search in title, description, and tag
      const sectionMap = [
        { gridId: 'articles-protocols', sectionId: 'protocol-section' },
        { gridId: 'articles-editorial', sectionId: 'editorial-section' },
        { gridId: 'articles-books', sectionId: 'books-section' }
      ];

      sectionMap.forEach(({ gridId, sectionId }) => {
        const cards = document.querySelectorAll('#' + gridId + ' .protocol-card-page');
        let matchCount = 0;
        cards.forEach(c => {
          const title = (c.querySelector('h3') ? c.querySelector('h3').textContent : '').toLowerCase();
          const desc = (c.querySelector('p') ? c.querySelector('p').textContent : '').toLowerCase();
          const tag = (c.querySelector('.protocol-card-tag') ? c.querySelector('.protocol-card-tag').textContent : '').toLowerCase();
          const matches = !query || title.includes(query) || desc.includes(query) || tag.includes(query);
          c.style.display = matches ? '' : 'none';
          if (matches) matchCount++;
        });
        const sectionEl = document.getElementById(sectionId);
        if (sectionEl) sectionEl.style.display = (query && matchCount === 0) ? 'none' : '';
      });
    }

    // Pre-fill search from homepage
    const urlParams = new URLSearchParams(window.location.search);
    const q = urlParams.get('q');
    if (q) {
      document.getElementById('search-input').value = q;
      setTimeout(() => filterArticles(), 300);
    }

    // Pre-select content type tab from URL (e.g. articles.html?type=editorial)
    const typeParam = urlParams.get('type');
    if (typeParam) {
      const matchingTab = document.querySelector('.type-tab[data-type="' + typeParam + '"]');
      if (matchingTab) {
        setTimeout(() => filterByType(typeParam, matchingTab), 50);
      }
    }
  </script>

</main>

</body>
</html>
