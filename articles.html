<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Stackofy | Evidence-Based Supplement Research</title>
  <meta name="description" content="Independent research on longevity supplements, dosing protocols, and what actually works. No pharma ties. No fluff." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="/header.js"></script>
  <script src="/articles-loader.js"></script>
  <style>
    :root {
      --green-dark: #1B4332; --green-mid: #2D6A4F; --green-light: #95D5B2;
      --gold: #D4A853; --gold-light: #FDF3E0; --bg: #FAF8F4; --surface: #ffffff;
      --text: #1A1A1A; --text-muted: #666666; --border: #E0DDD8;
      --gradient: linear-gradient(135deg, #1B4332 0%, #2D6A4F 55%, #7A5C10 100%);
      --radius: 12px; --radius-sm: 8px;
    }
    [data-theme="dark"] { --bg: #0F1A14; --surface: #1A2B20; --text: #F0EDE8; --text-muted: #9DB8AA; --border: #2A3D30; --gold-light: #2A220D; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: background 0.3s, color 0.3s; }
    a { text-decoration: none; color: inherit; }

    .articles-hero { position: relative; height: 280px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .hero-bg { position: absolute; inset: 0; background: var(--gradient); }
    .hero-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
    .hero-overlay { position: absolute; inset: 0; background: rgba(27,67,50,0.6); }
    .hero-text { position: relative; z-index: 2; text-align: center; padding: 2rem; }
    .hero-text h1 { color: #FAF8F4; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero-text p { color: var(--green-light); font-size: 15px; margin-bottom: 1.5rem; }
    .hero-search { display: flex; gap: 8px; max-width: 480px; margin: 0 auto; }
    .hero-search input { flex: 1; padding: 10px 16px; border-radius: var(--radius-sm); border: none; font-size: 14px; background: #FAF8F4; color: var(--text); }
    .hero-search input:focus { outline: none; }
    .hero-search button { padding: 10px 20px; background: var(--gold); color: #1A1A1A; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }

    .main { max-width: 1040px; margin: 0 auto; padding: 2.5rem 2rem; }
    .filter-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .filter-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all 0.2s; }
    .pill:hover { border-color: var(--green-dark); color: var(--green-dark); }
    .pill.active { background: var(--green-dark); color: #FAF8F4; border-color: var(--green-dark); }
    .articles-count { font-size: 13px; color: var(--text-muted); }
    .articles-count span { font-weight: 700; color: var(--text); }

    .articles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2.5rem; }
    .article-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .article-card:hover { border-color: var(--green-dark); transform: translateY(-2px); }
    .card-img { height: 140px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 1rem; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .article-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; background: #EAF5F0; color: var(--green-dark); padding: 3px 8px; border-radius: 4px; display: inline-block; }
    .read-time { font-size: 11px; color: var(--text-muted); }
    .article-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; line-height: 1.4; }
    .article-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .article-card.hidden { display: none; }

    .coming-soon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 2.5rem; }
    .coming-card { background: var(--surface); border-radius: var(--radius); border: 0.5px dashed var(--border); padding: 1.25rem; opacity: 0.7; }
    .coming-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .coming-card h4 { font-size: 13px; font-weight: 600; color: var(--text-muted); }

    @media (max-width: 900px) { .articles-grid { grid-template-columns: 1fr 1fr !important; } .coming-soon-grid { grid-template-columns: 1fr 1fr !important; } }
    @media (max-width: 600px) {
      .articles-hero { height: 220px !important; }
      .hero-text h1 { font-size: 1.4rem !important; }
      .hero-search { flex-direction: column !important; }
      .hero-search input, .hero-search button { width: 100% !important; }
      .main { padding: 1.25rem 1rem !important; }
      .filter-bar { flex-direction: column !important; align-items: flex-start !important; }
      .articles-grid { grid-template-columns: 1fr !important; }
      .coming-soon-grid { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>

  <div class="articles-hero">
    <div class="hero-bg">
      <img src="/images/scientist-desk-research-papers.jpg" alt="Research desk" onerror="this.style.display='none'" />
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <h1>The Research Library</h1>
      <p>Evidence-based. Independent. No pharma ties. No fluff.</p>
      <div class="hero-search">
        <input type="text" id="search-input" placeholder="Search supplements, protocols, ingredients..." oninput="filterArticles()" />
        <button>Search</button>
      </div>
    </div>
  </div>

  <div class="main">

    <div class="filter-bar">
      <div class="filter-pills">
        <span class="pill active" onclick="filterBy('all', this)">All</span>
        <span class="pill" onclick="filterBy('longevity', this)">Longevity</span>
        <span class="pill" onclick="filterBy('immune', this)">Immune</span>
        <span class="pill" onclick="filterBy('brain', this)">Brain</span>
        <span class="pill" onclick="filterBy('sleep', this)">Sleep</span>
        <span class="pill" onclick="filterBy('performance', this)">Performance</span>
        <span class="pill" onclick="filterBy('energy', this)">Energy</span>
      </div>
      <div class="articles-count"><span id="article-count">0</span> Articles</div>
    </div>

    <!-- AUTO-LOADED FROM articles.json -->
    <div id="articles-grid" class="articles-grid"></div>

    <div style="margin-bottom: 1rem;">
      <div style="font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem;">Coming Soon</div>
    </div>
    <div class="coming-soon-grid">
      <div class="coming-card"><div class="coming-label">Longevity</div><h4>Resveratrol + Pterostilbene</h4></div>
      <div class="coming-card"><div class="coming-label">Brain</div><h4>Lion's Mane Mushroom</h4></div>
      <div class="coming-card"><div class="coming-label">Sleep</div><h4>Ashwagandha + L-Theanine</h4></div>
      <div class="coming-card"><div class="coming-label">Metabolism</div><h4>Berberine</h4></div>
    </div>

  </div>

  <script>
    function filterBy(tag, el) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      const cards = document.querySelectorAll('#articles-grid .article-card');
      let count = 0;
      cards.forEach(c => {
        const tags = c.getAttribute('data-tags') || '';
        if (tag === 'all' || tags.includes(tag)) { c.classList.remove('hidden'); count++; }
        else { c.classList.add('hidden'); }
      });
      document.getElementById('article-count').textContent = count;
    }

    function filterArticles() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const cards = document.querySelectorAll('#articles-grid .article-card');
      let count = 0;
      cards.forEach(c => {
        const title = (c.getAttribute('data-title') || c.innerText).toLowerCase();
        if (title.includes(query)) { c.classList.remove('hidden'); count++; }
        else { c.classList.add('hidden'); }
      });
      document.getElementById('article-count').textContent = count;
    }
  </script>

</body>
</html>
